# Pequod — tmux colour scheme
# https://tiagojct.eu/projects/pequod/
#
# Source from your ~/.tmux.conf:
#
#     source-file ~/.config/tmux/Pequod.tmux.conf
#
# Pairs naturally with the Pequod terminal themes (Ghostty, Kitty,
# Alacritty, WezTerm, iTerm2). On its own, the colours still read
# correctly on any dark terminal background.

# Status bar — Log 900 deck under Log 100 lettering.
set -g status-style                "bg=#1C2936,fg=#F8F4EB"

# Status-left and -right segments.
set -g status-left-style           "bg=#527275,fg=#F8F4EB,bold"
set -g status-right-style          "bg=#1C2936,fg=#A5A5A0"

# Window status — current window in softsage; others in Ishmael grey.
set -g window-status-style         "bg=#1C2936,fg=#A5A5A0"
set -g window-status-current-style "bg=#527275,fg=#F8F4EB,bold"
set -g window-status-activity-style "bg=#1C2936,fg=#D9B461"  # Pip dark

# Pane borders.
set -g pane-border-style           "fg=#2C3E50"
set -g pane-active-border-style    "fg=#C4A57B"               # warmtaupe

# Command/message prompt.
set -g message-style               "bg=#2C3E50,fg=#F8F4EB"
set -g message-command-style       "bg=#2C3E50,fg=#D9B461"

# Mode (copy / scroll).
set -g mode-style                  "bg=#527275,fg=#F8F4EB"

# Clock mode.
set -g clock-mode-colour           "#7FA8C3"   # Starbuck dark
