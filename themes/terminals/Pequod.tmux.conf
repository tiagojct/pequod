# Pequod — tmux colour scheme
# https://tiagojct.eu/projects/pequod/
#
# Source from your ~/.tmux.conf:
#
#     source-file ~/.config/tmux/Pequod.tmux.conf
#
# Pairs naturally with the Pequod terminal themes (Ghostty, Kitty,
# Alacritty, WezTerm, iTerm2). On its own, the colours still read
# correctly on any dark terminal background.

# Status bar — Log 900 deck under Log 100 lettering.
set -g status-style                "bg=#0C222F,fg=#EAE1D7"

# Status-left and -right segments.
set -g status-left-style           "bg=#163f54,fg=#EAE1D7,bold"
set -g status-right-style          "bg=#0C222F,fg=#BFBBB6"

# Window status — current window in softsage; others in Ishmael grey.
set -g window-status-style         "bg=#0C222F,fg=#BFBBB6"
set -g window-status-current-style "bg=#163f54,fg=#EAE1D7,bold"
set -g window-status-activity-style "bg=#0C222F,fg=#DEC577"  # Pip dark

# Pane borders.
set -g pane-border-style           "fg=#0D2F42"
set -g pane-active-border-style    "fg=#BD8C68"               # warmtaupe

# Command/message prompt.
set -g message-style               "bg=#0D2F42,fg=#EAE1D7"
set -g message-command-style       "bg=#0D2F42,fg=#DEC577"

# Mode (copy / scroll).
set -g mode-style                  "bg=#163f54,fg=#EAE1D7"

# Clock mode.
set -g clock-mode-colour           "#A6DFFF"   # Starbuck dark
