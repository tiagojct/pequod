# Pequod — Alacritty colour scheme (dark)
# https://tiagojct.eu/projects/pequod/
#
# Background: Log 950 (#0B1720).  Foreground: Log 100 (#EAE1D7).
# Save to ~/.config/alacritty/themes/pequod.toml and add this line
# to your alacritty.toml:
#
#     [general]
#     import = ["~/.config/alacritty/themes/pequod.toml"]

[colors.primary]
background = "#0B1720"
foreground = "#EAE1D7"

[colors.cursor]
text   = "#0B1720"
cursor = "#BD8C68"

[colors.selection]
text       = "#EAE1D7"
background = "#0D2F42"

[colors.normal]
black   = "#0C222F"
red     = "#E3877C"
green   = "#82C4A2"
yellow  = "#DEC577"
blue    = "#A6DFFF"
magenta = "#838CCF"
cyan    = "#9DC2C5"
white   = "#EAE1D7"

[colors.bright]
black   = "#335260"
red     = "#E99C93"
green   = "#AFCCA6"
yellow  = "#E8CB8C"
blue    = "#A0C2D4"
magenta = "#AAADDA"
cyan    = "#BCD9DB"
white   = "#F7F3EE"
