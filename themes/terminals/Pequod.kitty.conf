# Pequod — kitty colour scheme (dark)
# https://tiagojct.eu/projects/pequod/
#
# Background: Log 950 (#13181F).  Foreground: Log 100 (#F8F4EB).
# Save to ~/.config/kitty/themes/Pequod.conf, then add `include
# themes/Pequod.conf` to your ~/.config/kitty/kitty.conf — or use
# `kitty +kitten themes Pequod` once the file is in place.

foreground            #F8F4EB
background            #13181F
selection_foreground  #F8F4EB
selection_background  #2C3E50

cursor                #C4A57B
cursor_text_color     #13181F

url_color             #9DC2C5

# Black
color0  #1C2936
color8  #6E5F52

# Red
color1  #E07A72
color9  #E99C93

# Green
color2  #8AB08C
color10 #AFCCA6

# Yellow
color3  #D9B461
color11 #E8CB8C

# Blue
color4  #7FA8C3
color12 #A0C2D4

# Magenta
color5  #8A8ECE
color13 #AAADDA

# Cyan
color6  #9DC2C5
