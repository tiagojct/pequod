# Pequod — kitty colour scheme (dark)
# https://tiagojct.eu/projects/pequod/
#
# Background: Log 950 (#0B1720).  Foreground: Log 100 (#EAE1D7).
# Save to ~/.config/kitty/themes/Pequod.conf, then add `include
# themes/Pequod.conf` to your ~/.config/kitty/kitty.conf — or use
# `kitty +kitten themes Pequod` once the file is in place.

foreground            #EAE1D7
background            #0B1720
selection_foreground  #EAE1D7
selection_background  #0D2F42

cursor                #BD8C68
cursor_text_color     #0B1720

url_color             #9DC2C5

# Black
color0  #0C222F
color8  #335260

# Red
color1  #E3877C
color9  #E99C93

# Green
color2  #82C4A2
color10 #AFCCA6

# Yellow
color3  #DEC577
color11 #E8CB8C

# Blue
color4  #A6DFFF
color12 #A0C2D4

# Magenta
color5  #838CCF
color13 #AAADDA

# Cyan
color6  #9DC2C5
color14 #BCD9DB

# White
color7  #EAE1D7
color15 #F7F3EE

# Tab bar
active_tab_foreground   #EAE1D7
active_tab_background   #163f54
inactive_tab_foreground #BFBBB6
inactive_tab_background #0C222F
